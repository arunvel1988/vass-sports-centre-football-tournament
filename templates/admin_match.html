<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ match['team_a'] }} vs {{ match['team_b'] }} — Admin</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif; background:#0b1220; color:#eee;
      margin:0; padding:16px; -webkit-tap-highlight-color: transparent;
    }
    .score { text-align:center; font-size:2.2rem; font-weight:700; margin:8px 0 20px; }
    .status { text-align:center; color:#9aa4c0; margin-bottom:16px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
    button.big {
      font-size:1.15rem; padding:26px 10px; border:none; border-radius:14px;
      color:white; font-weight:600; cursor:pointer; touch-action:manipulation;
    }
    .goal-a { background:#1f8f4c; }
    .goal-b { background:#1f6f8f; }
    .yellow-a, .yellow-b { background:#c9a400; color:#111; }
    .red-a, .red-b { background:#c9302c; }
    .control { background:#3a3f5c; }
    .full-width { grid-column: 1 / -1; }
    #log { margin-top:20px; font-size:0.9rem; color:#9aa4c0; max-height:180px; overflow-y:auto; }
    #log div { padding:4px 0; border-bottom:1px solid #202844; }
  </style>
</head>
<body>

  <div class="status" id="status">Loading…</div>
  <div class="score" id="score">– : –</div>
  <div class="half-scores" id="halfScores" style="text-align:center;color:#9aa4c0;margin-bottom:14px;"></div>

  <div style="text-align:center; margin-bottom:16px;">
    <label style="display:block; margin-bottom:6px; color:#9aa4c0;">
      Minute (auto-filled from kickoff — edit if wrong, e.g. stoppage time)
    </label>
    <input id="minuteInput" type="number" min="0"
      style="font-size:1.4rem; text-align:center; width:100px; padding:8px; border-radius:8px; border:none;">
  </div>

  <div class="grid">
    <button class="big goal-a" onclick="sendEvent('goal', teamA)">⚽ {{ match['team_a'] }} Goal</button>
    <button class="big goal-b" onclick="sendEvent('goal', teamB)">⚽ {{ match['team_b'] }} Goal</button>

    <button class="big yellow-a" onclick="sendEvent('yellow', teamA)">🟨 {{ match['team_a'] }} Yellow</button>
    <button class="big yellow-b" onclick="sendEvent('yellow', teamB)">🟨 {{ match['team_b'] }} Yellow</button>

    <button class="big red-a" onclick="sendEvent('red', teamA)">🟥 {{ match['team_a'] }} Red</button>
    <button class="big red-b" onclick="sendEvent('red', teamB)">🟥 {{ match['team_b'] }} Red</button>

    <button class="big control full-width" onclick="sendEvent('half_time', '')">⏸ Half Time</button>
    <button class="big control full-width" onclick="sendEvent('second_half', '')">▶️ Start 2nd Half</button>
    <button class="big control full-width" onclick="sendEvent('full_time', '')">✅ Full Time</button>
  </div>

  <div id="log"></div>

  <script>
    const matchId = {{ match['id'] }};
    const teamA = {{ match['team_a']|tojson }};
    const teamB = {{ match['team_b']|tojson }};

    let userEditedMinute = false;
    const minuteInput = document.getElementById('minuteInput');
    minuteInput.addEventListener('input', () => { userEditedMinute = true; });

    function render(data) {
      document.getElementById('score').textContent =
        `${data.team_a} ${data.score_a} : ${data.score_b} ${data.team_b}`;
      document.getElementById('status').textContent =
        `${data.status.toUpperCase()} ${data.half ? '· Half ' + data.half : ''} `
        + `· ${data.current_minute}' / ${data.duration_minutes}'`;

      const halfScores = document.getElementById('halfScores');
      let parts = [];
      if (data.half_time_score) parts.push(`HT: ${data.half_time_score}`);
      if (data.full_time_score) parts.push(`FT: ${data.full_time_score}`);
      halfScores.textContent = parts.join(' · ');

      // Keep the minute field in sync with the match clock, unless the
      // volunteer is mid-edit (e.g. correcting for stoppage time).
      if (!userEditedMinute) {
        minuteInput.value = data.current_minute;
      }

      const log = document.getElementById('log');
      log.innerHTML = '';
      data.events.slice().reverse().forEach(e => {
        const div = document.createElement('div');
        const icon = {goal:'⚽', yellow:'🟨', red:'🟥'}[e.type] || 'ℹ️';
        div.textContent = `${icon} ${e.minute}' ${e.type} ${e.team ? '— ' + e.team : ''}`;
        log.appendChild(div);
      });
    }

    async function sendEvent(type, team) {
      // 1-2 second interaction: tap, optional confirm skipped for speed.
      const body = {type, team};
      if (['goal', 'yellow', 'red'].includes(type)) {
        body.minute = parseInt(minuteInput.value, 10) || 0;
      }
      const res = await fetch(`/admin/${matchId}/event`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      const data = await res.json();
      userEditedMinute = false; // next event goes back to auto-fill
      render(data);
      if (navigator.vibrate) navigator.vibrate(30);
    }

    async function refresh() {
      const res = await fetch(`/api/matches/${matchId}`);
      render(await res.json());
    }
    refresh();
    setInterval(refresh, 15000); // keep the clock/minute ticking forward
  </script>
</body>
</html>
